<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дүкен панелі</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0b09;
  --s1: #161410;
  --s2: #1e1b15;
  --border: #2a261e;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --goldbg: rgba(201,168,76,0.12);
  --text: #f0ead8;
  --muted: #7a7060;
  --red: #c0392b;
  --green: #27ae60;
  --r: 10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.07) 0%,transparent 60%);}
.login-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:340px;text-align:center;}
.login-box .icon{font-size:52px;margin-bottom:14px;display:block;}
.login-box h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:6px;}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:28px;}
.login-box input{width:100%;padding:13px 16px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;margin-bottom:14px;outline:none;transition:border-color .2s;}
.login-box input:focus{border-color:var(--gold);}
#login-err{color:#e74c3c;font-size:13px;margin-top:10px;display:none;}

/* BUTTONS */
.btn-primary{padding:12px 22px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:9px;color:#0c0b09;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s;}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}
.btn-primary.full{width:100%;}
.btn-ghost{padding:10px 18px;background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{padding:8px 14px;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.25);color:var(--red);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s;}
.btn-danger:hover{background:rgba(192,57,43,.2);}
.btn-soft{padding:10px 18px;background:var(--goldbg);border:1px solid rgba(201,168,76,.3);color:var(--gold);border-radius:9px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;}
.btn-soft:hover{background:rgba(201,168,76,.2);}

/* APP */
#app{display:none;}
header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);}
.hbadge{background:var(--goldbg);color:var(--gold);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:4px 12px;font-size:12px;}

main{max-width:1080px;margin:0 auto;padding:36px 20px;}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:28px;}
.section-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:18px;display:flex;align-items:center;gap:8px;}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:580px){.form-row{grid-template-columns:1fr;}}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:500;}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;resize:vertical;}
.fg input:focus,.fg textarea:focus{border-color:var(--gold);}

/* PRODUCTS */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.pcard{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s,transform .2s;}
.pcard:hover{border-color:rgba(201,168,76,.3);transform:translateY(-2px);}

/* MEDIA PREVIEW */
.media-box{position:relative;width:100%;height:190px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden;}
.media-box img{width:100%;height:100%;object-fit:cover;}
.media-box video{width:100%;height:100%;object-fit:cover;}
.media-btns{position:absolute;top:8px;right:8px;display:flex;gap:6px;}
.mb-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:opacity .2s;}
.mb-btn.photo{background:var(--gold);color:#0c0b09;}
.mb-btn.video{background:#3498db;color:#fff;}
.mb-btn.del{background:rgba(192,57,43,.8);color:#fff;}
.mb-btn:hover{opacity:.85;}

.pbody{padding:18px;}
.pname{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:6px;}
.pprice{color:var(--gold);font-size:19px;font-weight:600;margin-bottom:5px;}
.psizes{font-size:12px;color:var(--muted);margin-bottom:8px;}
.pdesc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pactions{display:flex;gap:8px;}
.pactions .btn-ghost{flex:1;text-align:center;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:16px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:28px;}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.mtitle{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);}
.mclose{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;line-height:1;transition:color .2s;}
.mclose:hover{color:var(--text);}
.mfooter{display:flex;gap:10px;margin-top:6px;}

/* MEDIA UPLOAD IN MODAL */
.upload-area{border:2px dashed var(--border);border-radius:9px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:8px;position:relative;}
.upload-area:hover{border-color:var(--gold);}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-area .ua-icon{font-size:28px;margin-bottom:6px;}
.upload-area p{font-size:12px;color:var(--muted);}
.upload-area .ua-name{font-size:12px;color:var(--gold);margin-top:4px;}
.preview-thumb{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:8px;display:none;}
.preview-video{width:100%;max-height:160px;border-radius:8px;margin-bottom:8px;display:none;}
.url-or{text-align:center;font-size:12px;color:var(--muted);margin:8px 0;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--s1);border:1px solid var(--gold);color:var(--gold);padding:13px 22px;border-radius:10px;font-size:14px;z-index:2000;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

.empty{text-align:center;padding:50px 20px;color:var(--muted);grid-column:1/-1;}
.empty span{font-size:44px;display:block;margin-bottom:10px;}

/* HIDDEN FILE INPUTS */
.hidden-file{display:none;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <span class="icon">👗</span>
    <h1>Дүкен панелі</h1>
    <p>Тек сізге арналған</p>
    <input type="password" id="pwd" placeholder="Пароль" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-primary full" onclick="login()">Кіру →</button>
    <div id="login-err">Пароль қате. Қайталаңыз.</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">👗 <span id="hname">Дүкен</span></div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="hbadge">🤖 Бот белсенді</span>
      <button class="btn-ghost" style="padding:7px 14px;" onclick="doLogout()">Шығу</button>
    </div>
  </header>

  <main>
    <!-- Shop info -->
    <div class="section-title">⚙️ Дүкен баптаулары</div>
    <div class="card">
      <div class="form-row">
        <div class="fg">
          <label>Дүкен атауы</label>
          <input id="sname" placeholder="Менің дүкенім">
        </div>
        <div class="fg">
          <label>Сатушы аты (бот осы атпен сөйлеседі)</label>
          <input id="sseller" placeholder="Айгүл">
        </div>
      </div>
      <div class="fg">
        <label>Дүкен сипаттамасы</label>
        <input id="sdesc" placeholder="Сапалы және тренді киімдер...">
      </div>
      <button class="btn-soft" onclick="saveShop()">💾 Сақтау</button>
    </div>

    <!-- Products -->
    <div class="ph">
      <div class="section-title" style="margin-bottom:0">🛍️ Тауарлар</div>
      <button class="btn-primary" onclick="openModal()">+ Тауар қосу</button>
    </div>
    <div class="grid" id="pgrid">
      <div class="empty"><span>📦</span><p>Жүктелуде...</p></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle" id="mtitle">Тауар қосу</div>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>

    <input type="hidden" id="pid">

    <div class="fg">
      <label>Тауар атауы *</label>
      <input id="pname" placeholder="Қызыл жейде">
    </div>
    <div class="form-row">
      <div class="fg">
        <label>Баға *</label>
        <input id="pprice" placeholder="5 000 тг">
      </div>
      <div class="fg">
        <label>Размерлер</label>
        <input id="psizes" placeholder="S, M, L, XL">
      </div>
    </div>
    <div class="fg">
      <label>Сипаттама</label>
      <textarea id="pdesc" rows="3" placeholder="Тауар туралы..."></textarea>
    </div>

    <!-- PHOTO UPLOAD -->
    <div class="fg">
      <label>📷 Фото</label>
      <img id="prev-photo" class="preview-thumb">
      <div class="upload-area" id="photo-drop">
        <input type="file" id="photo-file" accept="image/*" onchange="handleFile('photo')">
        <div class="ua-icon">🖼️</div>
        <p>Фото жүктеу үшін басыңыз</p>
        <div class="ua-name" id="photo-fname"></div>
      </div>
      <div class="url-or">— немесе сілтеме —</div>
      <input id="pphoto" placeholder="https://example.com/photo.jpg" oninput="syncUrl('photo')">
    </div>

    <!-- VIDEO UPLOAD -->
    <div class="fg">
      <label>🎥 Видео</label>
      <video id="prev-video" class="preview-video" controls></video>
      <div class="upload-area" id="video-drop">
        <input type="file" id="video-file" accept="video/*" onchange="handleFile('video')">
        <div class="ua-icon">🎬</div>
        <p>Видео жүктеу үшін басыңыз</p>
        <div class="ua-name" id="video-fname"></div>
      </div>
      <div class="url-or">— немесе сілтеме —</div>
      <input id="pvideo" placeholder="https://example.com/video.mp4" oninput="syncUrl('video')">
    </div>

    <div class="mfooter">
      <button class="btn-primary" style="flex:1" onclick="saveProduct()">💾 Сақтау</button>
      <button class="btn-ghost" onclick="closeModal()">Бас тарту</button>
    </div>
  </div>
</div>

<!-- Hidden file inputs for inline edit -->
<input type="file" id="inline-photo" class="hidden-file" accept="image/*">
<input type="file" id="inline-video" class="hidden-file" accept="video/*">

<div class="toast" id="toast"></div>

<script>
let pwd = '';
let editId = null;
let inlineEditPid = null;

// ===== LOGIN =====
function login() {
  const p = document.getElementById('pwd').value;
  fetch('/admin/products', {headers:{'X-Admin-Password':p}})
    .then(r => {
      if (r.ok) {
        pwd = p;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAll();
      } else {
        document.getElementById('login-err').style.display = 'block';
      }
    }).catch(() => document.getElementById('login-err').style.display = 'block');
}

function doLogout() {
  pwd = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd').value = '';
}

// ===== API =====
function api(url, method='GET', body=null) {
  return fetch(url, {
    method,
    headers: {'X-Admin-Password': pwd, 'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : null
  }).then(r => r.json());
}

// ===== LOAD =====
function loadAll() {
  api('/admin/products').then(data => {
    const info = data.shop_info || {};
    document.getElementById('sname').value = info.name || '';
    document.getElementById('sseller').value = info.seller_name || '';
    document.getElementById('sdesc').value = info.description || '';
    document.getElementById('hname').textContent = info.name || 'Дүкен';
    renderProducts(data.products || []);
  });
}

// ===== SHOP INFO =====
function saveShop() {
  api('/admin/shop-info', 'PUT', {
    name: document.getElementById('sname').value,
    seller_name: document.getElementById('sseller').value,
    description: document.getElementById('sdesc').value
  }).then(() => {
    document.getElementById('hname').textContent = document.getElementById('sname').value;
    toast('✅ Сақталды!');
  });
}

// ===== RENDER PRODUCTS =====
function renderProducts(products) {
  const grid = document.getElementById('pgrid');
  if (!products.length) {
    grid.innerHTML = '<div class="empty"><span>📦</span><p>Тауар жоқ. "Тауар қосу" батырмасын басыңыз.</p></div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="pcard" id="pc-${p.id}">
      <div class="media-box" id="mb-${p.id}">
        ${mediaPreview(p)}
        <div class="media-btns">
          <button class="mb-btn photo" onclick="inlineChangePhoto(${p.id})">📷 Фото</button>
          <button class="mb-btn video" onclick="inlineChangeVideo(${p.id})">🎥 Видео</button>
          ${(p.photo_url||p.video_url)?`<button class="mb-btn del" onclick="clearMedia(${p.id})">✕</button>`:''}
        </div>
      </div>
      <div class="pbody">
        <div class="pname">${p.name||''}</div>
        <div class="pprice">${p.price||''}</div>
        <div class="psizes">📐 ${p.sizes||'—'}</div>
        <div class="pdesc">${p.description||''}</div>
        <div class="pactions">
          <button class="btn-ghost" onclick="editProduct(${p.id})">✏️ Өзгерту</button>
          <button class="btn-danger" onclick="deleteProduct(${p.id})">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

function mediaPreview(p) {
  if (p.video_url) return `<video src="${p.video_url}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
  if (p.photo_url) return `<img src="${p.photo_url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='👗'+this.parentElement.innerHTML.replace(this.outerHTML,'')">`;
  return '👗';
}

// ===== INLINE MEDIA CHANGE =====
function inlineChangePhoto(pid) {
  inlineEditPid = pid;
  const inp = document.getElementById('inline-photo');
  inp.onchange = () => uploadInlineFile(inp, pid, 'photo');
  inp.click();
}

function inlineChangeVideo(pid) {
  inlineEditPid = pid;
  const inp = document.getElementById('inline-video');
  inp.onchange = () => uploadInlineFile(inp, pid, 'video');
  inp.click();
}

function uploadInlineFile(inp, pid, type) {
  if (!inp.files[0]) return;
  const file = inp.files[0];
  // Use object URL for preview + store as data URL for sending
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const update = type === 'photo'
      ? {photo_url: dataUrl, video_url: ''}
      : {video_url: dataUrl, photo_url: ''};
    api(`/admin/products/${pid}`, 'PUT', update).then(() => {
      toast('✅ ' + (type==='photo'?'Фото':'Видео') + ' жаңартылды!');
      loadAll();
    });
  };
  reader.readAsDataURL(file);
  inp.value = '';
}

function clearMedia(pid) {
  if (!confirm('Медианы жою керек пе?')) return;
  api(`/admin/products/${pid}`, 'PUT', {photo_url:'', video_url:''}).then(() => {
    toast('🗑 Жойылды');
    loadAll();
  });
}

// ===== MODAL =====
function openModal(product=null) {
  editId = null;
  document.getElementById('mtitle').textContent = 'Тауар қосу';
  ['pid','pname','pprice','psizes','pdesc','pphoto','pvideo','photo-fname','video-fname'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  document.getElementById('prev-photo').style.display='none';
  document.getElementById('prev-video').style.display='none';

  if (product) {
    editId = product.id;
    document.getElementById('mtitle').textContent = 'Тауарды өзгерту';
    document.getElementById('pid').value = product.id;
    document.getElementById('pname').value = product.name||'';
    document.getElementById('pprice').value = product.price||'';
    document.getElementById('psizes').value = product.sizes||'';
    document.getElementById('pdesc').value = product.description||'';
    document.getElementById('pphoto').value = product.photo_url||'';
    document.getElementById('pvideo').value = product.video_url||'';
    if (product.photo_url) {
      const img=document.getElementById('prev-photo');
      img.src=product.photo_url; img.style.display='block';
    }
    if (product.video_url) {
      const vid=document.getElementById('prev-video');
      vid.src=product.video_url; vid.style.display='block';
    }
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function handleFile(type) {
  const file = document.getElementById(type+'-file').files[0];
  if (!file) return;
  document.getElementById(type+'-fname').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    if (type==='photo') {
      const img=document.getElementById('prev-photo');
      img.src=e.target.result; img.style.display='block';
      document.getElementById('pphoto').value=e.target.result;
    } else {
      const vid=document.getElementById('prev-video');
      vid.src=e.target.result; vid.style.display='block';
      document.getElementById('pvideo').value=e.target.result;
    }
  };
  reader.readAsDataURL(file);
}

function syncUrl(type) {
  const url = document.getElementById(type==='photo'?'pphoto':'pvideo').value;
  if (type==='photo') {
    const img=document.getElementById('prev-photo');
    if(url){img.src=url;img.style.display='block';}else img.style.display='none';
  } else {
    const vid=document.getElementById('prev-video');
    if(url){vid.src=url;vid.style.display='block';}else vid.style.display='none';
  }
}

function saveProduct() {
  const body = {
    name: document.getElementById('pname').value,
    price: document.getElementById('pprice').value,
    sizes: document.getElementById('psizes').value,
    description: document.getElementById('pdesc').value,
    photo_url: document.getElementById('pphoto').value,
    video_url: document.getElementById('pvideo').value,
  };
  if (!body.name || !body.price) { toast('⚠️ Атауы мен бағасы міндетті!'); return; }

  const p = editId
    ? api(`/admin/products/${editId}`, 'PUT', body)
    : api('/admin/products', 'POST', body);

  p.then(() => {
    closeModal();
    loadAll();
    toast(editId ? '✅ Жаңартылды!' : '✅ Тауар қосылды!');
  });
}

function editProduct(id) {
  api('/admin/products').then(data => {
    const p = data.products.find(x=>x.id===id);
    if(p) openModal(p);
  });
}

function deleteProduct(id) {
  if (!confirm('Тауарды жою керек пе?')) return;
  api(`/admin/products/${id}`, 'DELETE').then(() => { loadAll(); toast('🗑 Жойылды'); });
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
</script>
</body>
</html>
