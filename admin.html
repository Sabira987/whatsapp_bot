<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дүкен Боты — Админ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
.topbar{background:#1a1a2e;padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:600;color:#fff}
.topbar .badge{background:rgba(37,211,102,0.15);color:#25D366;font-size:11px;padding:3px 10px;border-radius:10px;border:1px solid rgba(37,211,102,0.3)}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab-btn{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;transition:all 0.2s}
.tab-btn.active{background:rgba(37,211,102,0.15);color:#25D366}
.container{max-width:1100px;margin:0 auto;padding:24px}
.section{display:none}
.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.card{background:#1a1a2e;border-radius:12px;border:1px solid rgba(255,255,255,0.08);padding:16px;transition:border-color 0.2s}
.card:hover{border-color:rgba(37,211,102,0.3)}
.card .cemoji{font-size:36px;margin-bottom:10px}
.card .cname{font-size:15px;font-weight:600;color:#fff}
.card .cprice{font-size:18px;color:#25D366;font-weight:700;margin:6px 0}
.card .cdesc{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.5;margin-bottom:10px}
.card .csizes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.card .csz{padding:3px 9px;background:rgba(255,255,255,0.07);border-radius:5px;font-size:11px;color:rgba(255,255,255,0.6)}
.card .cbtns{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:500}
.btn-green{background:#25D366;color:#fff}
.btn-green:hover{background:#128C7E}
.btn-red{background:rgba(220,53,69,0.15);color:#ff6b6b;border:1px solid rgba(220,53,69,0.25)}
.btn-red:hover{background:rgba(220,53,69,0.3)}
.btn-outline{background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15)}
.btn-outline:hover{border-color:rgba(37,211,102,0.5);color:#25D366}
.btn-add{width:100%;padding:14px;background:transparent;border:1.5px dashed rgba(37,211,102,0.35);border-radius:12px;color:#25D366;font-size:14px;cursor:pointer;transition:all 0.2s}
.btn-add:hover{background:rgba(37,211,102,0.07)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1a1a2e;border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.1);padding:24px}
.modal h2{font-size:16px;margin-bottom:18px;color:#fff}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px}
.form-row input,.form-row textarea,.form-row select{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;padding:9px 12px;font-size:13px;outline:none;font-family:inherit}
.form-row input:focus,.form-row textarea:focus{border-color:rgba(37,211,102,0.5)}
.form-row textarea{resize:vertical;min-height:70px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sizes-sel{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.sz-opt{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);transition:all 0.2s;user-select:none}
.sz-opt.on{background:rgba(37,211,102,0.2);border-color:#25D366;color:#25D366}
.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-thumb{width:68px;height:68px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,0.1);cursor:pointer;position:relative}
.img-thumb-wrap{position:relative;display:inline-block}
.img-thumb-wrap .del-img{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#e74c3c;border-radius:50%;border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-add-btn{width:68px;height:68px;border-radius:8px;border:1.5px dashed rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-footer{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat{background:#1a1a2e;border-radius:10px;padding:16px;border:1px solid rgba(255,255,255,0.07);text-align:center}
.stat .sval{font-size:28px;font-weight:700;color:#25D366}
.stat .slbl{font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px}
.orders-table{width:100%;border-collapse:collapse;font-size:13px}
.orders-table th{text-align:left;padding:10px 12px;font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(255,255,255,0.08)}
.orders-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.05);color:rgba(255,255,255,0.75)}
.orders-table tr:hover td{background:rgba(255,255,255,0.03)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert.success{background:rgba(37,211,102,0.1);color:#25D366;border:1px solid rgba(37,211,102,0.2)}
.alert.error{background:rgba(220,53,69,0.1);color:#ff6b6b;border:1px solid rgba(220,53,69,0.2)}
.key-form{background:#1a1a2e;border-radius:12px;padding:20px;border:1px solid rgba(255,255,255,0.08);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.key-form input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;padding:9px 12px;font-size:13px;outline:none}
.stock-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.in-stock{background:rgba(37,211,102,0.15);color:#25D366}
.no-stock{background:rgba(220,53,69,0.15);color:#ff6b6b}
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:22px">👗</span>
  <h1>Дүкен Боты</h1>
  <span class="badge" id="bot-status">🟢 Жұмыс істеуде</span>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('products')">Өнімдер</button>
    <button class="tab-btn" onclick="showTab('orders')">Тапсырыстар</button>
    <button class="tab-btn" onclick="showTab('settings')">Баптаулар</button>
  </div>
</div>

<div class="container">
  <div class="key-form" id="key-form">
    <span style="font-size:14px;color:rgba(255,255,255,0.5);white-space:nowrap">🔑 Админ кілті:</span>
    <input type="password" id="admin-key" placeholder="Кілтті енгізіңіз..." value="admin123">
    <button class="btn btn-green" onclick="loadAll()">Кіру →</button>
  </div>
  <div class="alert" id="alert"></div>

  <!-- ӨНІМДЕР -->
  <div class="section active" id="section-products">
    <div class="grid" id="products-grid">
      <button class="btn-add" onclick="openAddModal()">+ Жаңа өнім қосу</button>
    </div>
  </div>

  <!-- ТАПСЫРЫСТАР -->
  <div class="section" id="section-orders">
    <div class="stats-grid" id="stats-grid"></div>
    <div style="background:#1a1a2e;border-radius:12px;border:1px solid rgba(255,255,255,0.08);overflow:hidden">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Күні</th><th>Өнім</th><th>Размер</th><th>Адрес</th><th>Баға</th><th>Тіл</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>
  </div>

  <!-- БАПТАУЛАР -->
  <div class="section" id="section-settings">
    <div class="card" style="max-width:480px">
      <h3 style="font-size:15px;margin-bottom:16px;color:#fff">Webhook URL</h3>
      <p style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:12px">Twilio консолінде осы URL-ді орнатыңыз:</p>
      <div style="background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.2);border-radius:8px;padding:12px;font-size:13px;color:#25D366;word-break:break-all" id="webhook-url"></div>
      <button class="btn btn-outline" style="margin-top:12px" onclick="copyWebhook()">📋 Көшіру</button>
    </div>
  </div>
</div>

<!-- МОДАЛ: өнім қосу/өзгерту -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Өнім қосу</h2>
    <input type="hidden" id="edit-id">

    <div class="form-2col">
      <div class="form-row">
        <label>Атауы (ҚАЗ)</label>
        <input id="f-name-kz" placeholder="Жазғы көйлек">
      </div>
      <div class="form-row">
        <label>Название (РУС)</label>
        <input id="f-name-ru" placeholder="Летнее платье">
      </div>
    </div>

    <div class="form-2col">
      <div class="form-row">
        <label>Баға / Цена (₸)</label>
        <input id="f-price" type="number" placeholder="12500">
      </div>
      <div class="form-row">
        <label>Эмодзи</label>
        <input id="f-emoji" placeholder="👗" style="width:80px">
      </div>
    </div>

    <div class="form-row">
      <label>Сипаттама (ҚАЗ)</label>
      <textarea id="f-desc-kz" placeholder="100% мақта, жеңіл материал..."></textarea>
    </div>
    <div class="form-row">
      <label>Описание (РУС)</label>
      <textarea id="f-desc-ru" placeholder="100% хлопок, лёгкий материал..."></textarea>
    </div>

    <div class="form-2col">
      <div class="form-row">
        <label>Түстер (ҚАЗ)</label>
        <input id="f-colors-kz" placeholder="Ақ, Қызыл, Көк">
      </div>
      <div class="form-row">
        <label>Цвета (РУС)</label>
        <input id="f-colors-ru" placeholder="Белый, Красный, Синий">
      </div>
    </div>

    <div class="form-row">
      <label>Размерлер</label>
      <div class="sizes-sel" id="sizes-sel">
        <span class="sz-opt" onclick="this.classList.toggle('on')">XS</span>
        <span class="sz-opt" onclick="this.classList.toggle('on')">S</span>
        <span class="sz-opt on" onclick="this.classList.toggle('on')">M</span>
        <span class="sz-opt on" onclick="this.classList.toggle('on')">L</span>
        <span class="sz-opt" onclick="this.classList.toggle('on')">XL</span>
        <span class="sz-opt" onclick="this.classList.toggle('on')">XXL</span>
        <span class="sz-opt" onclick="this.classList.toggle('on')">XXXL</span>
      </div>
    </div>

    <div class="form-row">
      <label>Фото / Видео</label>
      <div class="img-grid" id="img-grid">
        <button class="img-add-btn" onclick="triggerImgUpload()" type="button">+</button>
      </div>
      <input type="file" id="img-input" accept="image/*,video/*" style="display:none" onchange="uploadImg(event)">
    </div>

    <div class="form-row">
      <label>Қорда бар ма?</label>
      <select id="f-stock">
        <option value="true">✅ Иә, бар</option>
        <option value="false">❌ Жоқ</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Бас тарту</button>
      <button class="btn btn-green" onclick="saveProduct()">✓ Сақтау</button>
    </div>
  </div>
</div>

<script>
let adminKey = 'admin123';
let products = [];
let editingImages = [];

function getKey(){ return document.getElementById('admin-key').value || adminKey; }

async function api(method, endpoint, body){
  const opts = { method, headers: { 'x-admin-key': getKey(), 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(endpoint, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function showAlert(msg, type='success'){
  const el = document.getElementById('alert');
  el.textContent = msg; el.className = 'alert show ' + type;
  setTimeout(()=>el.className='alert', 3000);
}

function showTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab==='orders') loadOrders();
}

async function loadAll(){
  adminKey = getKey();
  try {
    products = await api('GET', '/api/products');
    renderProducts();
    showAlert('✅ Сәтті кірдіңіз!');
  } catch(e){ showAlert('❌ Кілт қате немесе сервер жауап бермеді', 'error'); }
}

function renderProducts(){
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="cemoji">${p.emoji}</div>
      <div class="cname">${p.name.kz} <span class="stock-badge ${p.inStock?'in-stock':'no-stock'}">${p.inStock?'Бар':'Жоқ'}</span></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:4px">${p.name.ru}</div>
      <div class="cprice">${Number(p.price).toLocaleString()} ₸</div>
      <div class="cdesc">${p.desc.kz}</div>
      <div class="csizes">${(p.sizes||[]).map(s=>`<span class="csz">${s}</span>`).join('')}</div>
      ${p.images&&p.images.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">${p.images.map(img=>`<img src="${img}" style="width:48px;height:48px;border-radius:6px;object-fit:cover;">`).join('')}</div>`:''}
      <div class="cbtns">
        <button class="btn btn-green" onclick="openEditModal(${p.id})">✏️ Өзгерту</button>
        <button class="btn btn-red" onclick="deleteProduct(${p.id})">🗑</button>
      </div>`;
    grid.appendChild(card);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add';
  addBtn.textContent = '+ Жаңа өнім қосу';
  addBtn.onclick = openAddModal;
  grid.appendChild(addBtn);
}

function openAddModal(){
  document.getElementById('modal-title').textContent = 'Жаңа өнім қосу';
  document.getElementById('edit-id').value = '';
  ['f-name-kz','f-name-ru','f-price','f-emoji','f-desc-kz','f-desc-ru','f-colors-kz','f-colors-ru'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-emoji').value = '👕';
  document.getElementById('f-stock').value = 'true';
  document.querySelectorAll('.sz-opt').forEach(el=>el.classList.remove('on'));
  editingImages = [];
  renderImgGrid();
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id){
  const p = products.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('modal-title').textContent = 'Өнімді өзгерту';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-name-kz').value = p.name.kz;
  document.getElementById('f-name-ru').value = p.name.ru;
  document.getElementById('f-price').value = p.price;
  document.getElementById('f-emoji').value = p.emoji;
  document.getElementById('f-desc-kz').value = p.desc.kz;
  document.getElementById('f-desc-ru').value = p.desc.ru;
  document.getElementById('f-colors-kz').value = p.colors.kz;
  document.getElementById('f-colors-ru').value = p.colors.ru;
  document.getElementById('f-stock').value = p.inStock ? 'true' : 'false';
  document.querySelectorAll('.sz-opt').forEach(el=>{
    el.classList.toggle('on', (p.sizes||[]).includes(el.textContent));
  });
  editingImages = [...(p.images||[])];
  renderImgGrid();
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

function renderImgGrid(){
  const grid = document.getElementById('img-grid');
  grid.innerHTML = '';
  editingImages.forEach((url, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-thumb-wrap';
    wrap.innerHTML = `<img src="${url}" class="img-thumb"><button class="del-img" onclick="removeImg(${i})">×</button>`;
    grid.appendChild(wrap);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'img-add-btn';
  addBtn.type = 'button';
  addBtn.textContent = '+';
  addBtn.onclick = triggerImgUpload;
  grid.appendChild(addBtn);
}

function removeImg(i){ editingImages.splice(i,1); renderImgGrid(); }
function triggerImgUpload(){ document.getElementById('img-input').click(); }

async function uploadImg(event){
  const file = event.target.files[0];
  if(!file) return;
  const id = document.getElementById('edit-id').value;
  if(!id){ showAlert('Алдымен сақтаңыз, содан кейін фото жүктеңіз','error'); return; }
  const fd = new FormData();
  fd.append('image', file);
  const r = await fetch(`/api/products/${id}/upload`, { method:'POST', headers:{'x-admin-key':getKey()}, body:fd });
  const data = await r.json();
  editingImages.push(data.url);
  renderImgGrid();
  event.target.value = '';
}

async function saveProduct(){
  const id = document.getElementById('edit-id').value;
  const sizes = [...document.querySelectorAll('.sz-opt.on')].map(el=>el.textContent);
  const body = {
    name: { kz: document.getElementById('f-name-kz').value, ru: document.getElementById('f-name-ru').value },
    price: document.getElementById('f-price').value,
    emoji: document.getElementById('f-emoji').value || '👕',
    desc: { kz: document.getElementById('f-desc-kz').value, ru: document.getElementById('f-desc-ru').value },
    colors: { kz: document.getElementById('f-colors-kz').value, ru: document.getElementById('f-colors-ru').value },
    sizes,
    inStock: document.getElementById('f-stock').value === 'true',
    images: editingImages
  };
  try {
    if(id) {
      await api('PUT', `/api/products/${id}`, body);
      showAlert('✅ Өзгертулер сақталды!');
    } else {
      await api('POST', '/api/products', body);
      showAlert('✅ Жаңа өнім қосылды!');
    }
    products = await api('GET', '/api/products');
    renderProducts();
    closeModal();
  } catch(e){ showAlert('❌ Қате: '+e.message, 'error'); }
}

async function deleteProduct(id){
  if(!confirm('Өнімді жоясыз ба?')) return;
  await api('DELETE', `/api/products/${id}`);
  products = await api('GET', '/api/products');
  renderProducts();
  showAlert('🗑 Өнім жойылды');
}

async function loadOrders(){
  const orders = await api('GET', '/api/orders');
  const tbody = document.getElementById('orders-body');
  tbody.innerHTML = '';
  orders.reverse().forEach(o => {
    const tr = document.createElement('tr');
    const date = new Date(o.date).toLocaleString('kk-KZ');
    tr.innerHTML = `<td>${date}</td><td>${o.product}</td><td>${o.size}</td><td>${o.address}</td><td>${Number(o.price).toLocaleString()} ₸</td><td>${o.lang==='kz'?'ҚАЗ':'РУС'}</td>`;
    tbody.appendChild(tr);
  });

  const total = orders.reduce((s,o)=>s+Number(o.price),0);
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat"><div class="sval">${orders.length}</div><div class="slbl">Жалпы тапсырыс</div></div>
    <div class="stat"><div class="sval">${total.toLocaleString()} ₸</div><div class="slbl">Жалпы сома</div></div>
    <div class="stat"><div class="sval">${orders.filter(o=>o.lang==='kz').length}</div><div class="slbl">Қазақша клиент</div></div>
    <div class="stat"><div class="sval">${orders.filter(o=>o.lang==='ru').length}</div><div class="slbl">Орысша клиент</div></div>`;
}

function copyWebhook(){
  const url = document.getElementById('webhook-url').textContent;
  navigator.clipboard.writeText(url).then(()=>showAlert('📋 Көшірілді!'));
}

// Инициализация
document.getElementById('webhook-url').textContent = window.location.origin + '/webhook';
loadAll();
</script>
</body>
</html>
